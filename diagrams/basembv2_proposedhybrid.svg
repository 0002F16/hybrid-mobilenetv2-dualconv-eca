<text x="515" y="183" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">1×1 Conv (Expand)</text>

<!-- DualConv NEW -->
<rect x="430" y="220" width="170" height="58" rx="6" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1.2"/>
