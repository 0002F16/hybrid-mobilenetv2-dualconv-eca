    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>



<!-- ===== LEFT: Base Model ===== -->
<!-- Header -->
<rect x="30" y="45" width="270" height="34" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="165" y="67" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Base MobileNetV2</text>

<!-- Input -->
