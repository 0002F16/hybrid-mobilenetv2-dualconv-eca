<line x1="165" y1="138" x2="165" y2="158" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="165" y1="198" x2="165" y2="218" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="165" y1="266" x2="165" y2="286" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="165" y1="326" x2="165" y2="346" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="165" y1="386" x2="165" y2="406" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

