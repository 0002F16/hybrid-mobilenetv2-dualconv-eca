<text x="652" y="285" text-anchor="middle" font-size="10" fill="#888780" transform="rotate(90, 652, 285)">skip</text>

<!-- Divider -->
<line x1="340" y1="40" x2="340" y2="625" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>

<!-- Legend -->
<rect x="30" y="548" width="620" height="62" rx="8" stroke="#B4B2A9" stroke-width="0.5" fill="#F8F7F3"/>
<text x="44" y="567" font-size="12" font-weight="500" fill="#2C2C2A">Legend:</text>
