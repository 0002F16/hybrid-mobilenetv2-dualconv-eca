<text x="165" y="371" text-anchor="middle" font-size="11" fill="#5F5E5A">No channel attention</text>

<!-- Residual -->
<rect x="80" y="408" width="170" height="38" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="165" y="431" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Output F(X)</text>


