<text x="515" y="254" text-anchor="middle" font-size="11" fill="#085041">Br-A: 3×3 grouped conv</text>
<text x="515" y="269" text-anchor="middle" font-size="11" fill="#085041">Br-B: 1×1 channel mix</text>
