<text x="38" y="285" text-anchor="middle" font-size="10" fill="#888780" transform="rotate(-90, 38, 285)">skip</text>

<!-- ===== RIGHT: Proposed Model ===== -->
<!-- Header -->
<rect x="380" y="45" width="270" height="34" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
