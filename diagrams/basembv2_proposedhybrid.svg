<text x="515" y="323" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">1×1 Conv (Project) + BN</text>

<!-- ECA NEW -->
<rect x="430" y="360" width="170" height="58" rx="6" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1.2"/>
<text x="515" y="378" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">ECA Module</text>
<text x="515" y="394" text-anchor="middle" font-size="11" fill="#085041">Global avg pool + 1D conv</text>
<text x="515" y="409" text-anchor="middle" font-size="11" fill="#085041">Sigmoid channel reweight</text>
<!-- NEW badge -->
<rect x="596" y="360" width="32" height="16" rx="4" fill="#0F6E56"/>
<text x="612" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#9FE1CB">NEW</text>

<!-- Residual -->
<rect x="430" y="440" width="170" height="38" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="515" y="463" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Output F(X)
</text>

<!-- Arrows right -->
<line x1="515" y1="138" x2="515" y2="158" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="515" y1="198" x2="515" y2="218" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="515" y1="278" x2="515" y2="298" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="515" y1="338" x2="515" y2="358" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="515" y1="418" x2="515" y2="438" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

