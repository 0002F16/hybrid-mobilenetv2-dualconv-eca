<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: Arial, sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== TOP ROW ===== -->
<!-- Input X -->
<rect x="20" y="50" width="80" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="60" y="76" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Input X</text>

<!-- 1x1 Expand -->
<rect x="120" y="50" width="100" height="44" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="170" y="68" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">1×1 Conv</text>
<text x="170" y="84" text-anchor="middle" font-size="11" fill="#185FA5">(Expand)</text>

<!-- 3x3 Depthwise -->
<rect x="240" y="50" width="120" height="44" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="300" y="68" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">3×3 Depthwise</text>
<text x="300" y="84" text-anchor="middle" font-size="11" fill="#185FA5">Conv</text>

<!-- 1x1 Project + BN -->
<rect x="380" y="50" width="130" height="44" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="445" y="68" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">1×1 Conv</text>
<text x="445" y="84" text-anchor="middle" font-size="11" fill="#185FA5">(Project) + BN</text>

<!-- ECA Module NEW -->
<rect x="530" y="50" width="120" height="44" rx="6" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1.2"/>
<text x="590" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">ECA Module</text>
<!-- NEW badge -->
<rect x="646" y="50" width="32" height="16" rx="4" fill="#0F6E56"/>
<text x="662" y="62" text-anchor="middle" font-size="10" font-weight="600" fill="#9FE1CB">NEW</text>

<!-- Output F(X) -->
<rect x="700" y="50" width="100" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="750" y="68" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Output F(X)</text>
<text x="750" y="84" text-anchor="middle" font-size="11" fill="#5F5E5A">channel-weighted</text>

<!-- Top row arrows -->
<line x1="100" y1="72" x2="118" y2="72" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="220" y1="72" x2="238" y2="72" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="360" y1="72" x2="378" y2="72" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="510" y1="72" x2="528" y2="72" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="650" y1="72" x2="698" y2="72" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Annotation lines down -->
<text x="130" y="115" font-size="10" fill="#5F5E5A">expand</text>
<text x="130" y="126" font-size="10" fill="#5F5E5A">Cin → t·Cin</text>
<line x1="158" y1="94" x2="158" y2="128" stroke="#888780" stroke-width="0.7" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

<text x="248" y="115" font-size="10" fill="#5F5E5A">depthwise conv</text>
<text x="248" y="126" font-size="10" fill="#5F5E5A">3×3, stride 1/2</text>
<line x1="280" y1="94" x2="280" y2="128" stroke="#888780" stroke-width="0.7" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

<text x="390" y="115" font-size="10" fill="#5F5E5A">project</text>
<text x="390" y="126" font-size="10" fill="#5F5E5A">t·Cin → Cout + BatchNorm</text>
<line x1="430" y1="94" x2="430" y2="128" stroke="#888780" stroke-width="0.7" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

<text x="540" y="115" font-size="10" fill="#085041">apply ECA</text>
<line x1="565" y1="94" x2="565" y2="128" stroke="#0F6E56" stroke-width="0.7" stroke-dasharray="3 2" marker-end="url(#arrow-teal)"/>

<text x="708" y="115" font-size="10" fill="#5F5E5A">channel-weighted</text>
<text x="708" y="126" font-size="10" fill="#5F5E5A">output F(X)</text>
<line x1="735" y1="94" x2="735" y2="128" stroke="#888780" stroke-width="0.7" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

<!-- ===== ECA detail box ===== -->
<rect x="500" y="140" width="200" height="110" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" stroke-dasharray="5 3"/>
<text x="600" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">ECA structure:</text>
<text x="515" y="178" font-size="11" fill="#085041">• Global average pooling</text>
<text x="515" y="196" font-size="11" fill="#085041">• 1D conv over channels</text>
<text x="515" y="214" font-size="11" fill="#085041">• Sigmoid activation</text>
<text x="515" y="232" font-size="11" fill="#085041">• Channel-wise reweighting</text>

<!-- arrow from ECA box down to detail -->
<line x1="575" y1="94" x2="575" y2="138" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arrow-teal)"/>

<!-- ===== BOTTOM ROW ===== -->
<rect x="20" y="298" width="80" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="60" y="324" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Input X</text>

<rect x="120" y="298" width="100" height="44" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="170" y="316" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">1×1 Conv</text>
<text x="170" y="332" text-anchor="middle" font-size="11" fill="#185FA5">(Expand)</text>

<rect x="240" y="298" width="120" height="44" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="300" y="316" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">3×3 Depthwise</text>
<text x="300" y="332" text-anchor="middle" font-size="11" fill="#185FA5">Conv</text>

<rect x="380" y="298" width="130" height="44" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="445" y="316" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">1×1 Conv</text>
<text x="445" y="332" text-anchor="middle" font-size="11" fill="#185FA5">(Project) + BN</text>

<rect x="530" y="298" width="120" height="44" rx="6" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1.2"/>
<text x="590" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">ECA Module</text>

<rect x="700" y="298" width="100" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="750" y="316" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Output F(X)</text>

<!-- Bottom row arrows -->
<line x1="100" y1="320" x2="118" y2="320" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="220" y1="320" x2="238" y2="320" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="360" y1="320" x2="378" y2="320" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="510" y1="320" x2="528" y2="320" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="650" y1="320" x2="698" y2="320" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Bracket lines -->
<line x1="20" y1="94" x2="20" y2="298" stroke="#B4B2A9" stroke-width="0.8"/>
<line x1="800" y1="94" x2="800" y2="298" stroke="#B4B2A9" stroke-width="0.8"/>

<!-- Legend -->
<rect x="20" y="368" width="860" height="42" rx="8" stroke="#B4B2A9" stroke-width="0.5" fill="#F8F7F3"/>
<rect x="36" y="380" width="14" height="14" rx="3" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.8"/>
<text x="56" y="391" font-size="11" fill="#2C2C2A">New / modified component (ECA inserted after projection, before residual)</text>
<rect x="470" y="380" width="14" height="14" rx="3" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="490" y="391" font-size="11" fill="#2C2C2A">Unchanged from base MobileNetV2</text>
</svg>
