<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: Arial, sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== TOP ROW: main pipeline ===== -->
<!-- Input X -->
<rect x="20" y="50" width="90" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="65" y="76" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Input X</text>

<!-- 1x1 Expand -->
<rect x="140" y="50" width="100" height="44" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="190" y="68" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">1×1 Conv</text>
<text x="190" y="84" text-anchor="middle" font-size="11" fill="#185FA5">(Expand)</text>

<!-- DualConv box -->
<rect x="270" y="50" width="220" height="44" rx="6" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1.2"/>
<text x="380" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">DualConv</text>
<text x="380" y="84" text-anchor="middle" font-size="11" fill="#085041">Two-branch structure</text>

<!-- 1x1 Project -->
<rect x="520" y="50" width="100" height="44" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="570" y="68" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">1×1 Conv</text>
<text x="570" y="84" text-anchor="middle" font-size="11" fill="#185FA5">(Project)</text>

<!-- Output F(X) -->
<rect x="650" y="50" width="90" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="695" y="68" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Output</text>
<text x="695" y="84" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">F(X)</text>

<!-- Top row arrows -->
<line x1="110" y1="72" x2="138" y2="72" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="240" y1="72" x2="268" y2="72" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="490" y1="72" x2="518" y2="72" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="620" y1="72" x2="648" y2="72" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- expand label -->
<text x="155" y="115" font-size="10" fill="#5F5E5A">expand</text>
<text x="155" y="126" font-size="10" fill="#5F5E5A">Cin → t·Cin</text>
<line x1="180" y1="94" x2="180" y2="128" stroke="#888780" stroke-width="0.7" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

<!-- replace depthwise conv label -->
<text x="285" y="115" font-size="10" fill="#085041">replace depthwise conv</text>
<line x1="320" y1="94" x2="320" y2="128" stroke="#0F6E56" stroke-width="0.7" stroke-dasharray="3 2" marker-end="url(#arrow-teal)"/>

<!-- project label -->
<text x="530" y="115" font-size="10" fill="#5F5E5A">project</text>
<text x="530" y="126" font-size="10" fill="#5F5E5A">t·Cin → Cout</text>
<line x1="555" y1="94" x2="555" y2="128" stroke="#888780" stroke-width="0.7" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

<!-- linear output label -->
<text x="658" y="115" font-size="10" fill="#5F5E5A">linear output</text>
<line x1="680" y1="94" x2="680" y2="128" stroke="#888780" stroke-width="0.7" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

<!-- ===== DualConv detail box ===== -->
<rect x="258" y="138" width="244" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" stroke-dasharray="5 3"/>
<text x="380" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">DualConv Structure:</text>
<text x="275" y="176" font-size="11" fill="#085041">• Branch A: 3×3 conv (grouped)</text>
<text x="275" y="194" font-size="11" fill="#085041">• Branch B: 1×1 conv</text>
<text x="275" y="212" font-size="11" fill="#085041">• Merge outputs (add/concat)</text>

<!-- arrow from dualconv box down into detail -->
<line x1="350" y1="128" x2="350" y2="136" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arrow-teal)"/>

<!-- ===== BOTTOM ROW: repeat pipeline (mirror) ===== -->
<!-- Input X -->
<rect x="20" y="298" width="90" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="65" y="324" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Input X</text>

<!-- 1x1 Expand -->
<rect x="140" y="298" width="100" height="44" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="190" y="316" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">1×1 Conv</text>
<text x="190" y="332" text-anchor="middle" font-size="11" fill="#185FA5">(Expand)</text>

<!-- DualConv bottom -->
<rect x="270" y="298" width="220" height="44" rx="6" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1.2"/>
<text x="380" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">DualConv</text>
<text x="380" y="332" text-anchor="middle" font-size="11" fill="#085041">Two-branch structure</text>

<!-- 1x1 Project bottom -->
<rect x="520" y="298" width="100" height="44" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="570" y="316" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">1×1 Conv</text>
<text x="570" y="332" text-anchor="middle" font-size="11" fill="#185FA5">(Project)</text>

<!-- Output bottom -->
<rect x="650" y="298" width="90" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="695" y="316" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Output</text>
<text x="695" y="332" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">F(X)</text>

<!-- Bottom row arrows -->
<line x1="110" y1="320" x2="138" y2="320" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="240" y1="320" x2="268" y2="320" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="490" y1="320" x2="518" y2="320" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="620" y1="320" x2="648" y2="320" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Bracket lines connecting top and bottom rows -->
<line x1="20" y1="94" x2="20" y2="298" stroke="#B4B2A9" stroke-width="0.8"/>
<line x1="740" y1="94" x2="740" y2="298" stroke="#B4B2A9" stroke-width="0.8"/>

<!-- Legend -->
<rect x="20" y="368" width="760" height="42" rx="8" stroke="#B4B2A9" stroke-width="0.5" fill="#F8F7F3"/>
<rect x="36" y="380" width="14" height="14" rx="3" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.8"/>
<text x="56" y="391" font-size="11" fill="#2C2C2A">New / modified component (DualConv replaces standard depthwise conv)</text>
<rect x="440" y="380" width="14" height="14" rx="3" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="460" y="391" font-size="11" fill="#2C2C2A">Unchanged from base MobileNetV2</text>
</svg>
