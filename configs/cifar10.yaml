# CIFAR-10 experiment configuration
dataset: cifar10
dataset_root: ./data

# Model
model: hybrid
num_classes: 10
width_multiplier: 1.0

# Training
batch_size: 64
epochs: 150
learning_rate: 0.1
momentum: 0.9
weight_decay: 5.0e-4

# Validation and logging cadence
val_interval_epochs: 1
summary_log_interval_epochs: 10

# Early stopping (validation Top-1 accuracy, percentage points)
early_stopping:
  enabled: true
  warmup_epochs: 30
  patience_epochs: 20
  min_delta_pp: 0.1

# Scheduler (cosine annealing)
scheduler: cosine

# Reproducibility
seed: 42
split_seed: 1337
num_workers: 4
