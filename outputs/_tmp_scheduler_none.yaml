dataset: cifar10
dataset_root: ./data
model: hybrid
num_classes: 10
width_multiplier: 1.0
batch_size: 64
epochs: 150
learning_rate: 0.1
momentum: 0.9
weight_decay: 0.0005
val_interval_epochs: 1
summary_log_interval_epochs: 10
early_stopping:
  enabled: true
  warmup_epochs: 30
  patience_epochs: 20
  min_delta_pp: 0.1
scheduler: none
seed: 42
split_seed: 1337
num_workers: 4
